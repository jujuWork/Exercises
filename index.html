<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excercise</title>

    <link rel="stylesheet" href="index.css">

    <script src="index.js" ></script>
</head>
<body>

    <header>
        <div>
            <h1 id="title">Excercise Survery</h1>
            <p id="description">A survey for the town people</p>
        </div>
    </header>

    <form id="survey-form">
        <label for="name-lable" id="name-label">Name</label>
        <input type="text" name="Name" id="name" required placeholder="Enter your name">

        <label for="email-label" id="email-label">Email</label>
        <input type="email" name="Email" id="email" required placeholder="Enter your email">

        <label for="number-label" id="number-label">Number</label>
        <input type="number" name="Number" id="number" required min="0" max="9999" placeholder="Enter your contact number">

        <label for="Role" id="role-label">Your Current Role</label>
        <select name="Select" id="dropdown">
            <option value="Select">Current Role</option>
            <option value="Number">Full Time</option>
            <option value="Email">Part Time</option>
        </select>
        
        <label for="Gender" class="gender">Gender</label>
        <input type="radio" name="Male" id="male" value="Male"><label for="Male">Male</label>
        <input type="radio" name="Female" id="female" value="Female"><label for="Female">Female</label>

        <label for="Language">Web Language</label>
        <input type="checkbox" name="HTML" id="html" value="HTML"><label for="html">HTML</label>
        <input type="checkbox" name="CSS" id="html" value="CSS"><label for="html">CSS</label>
        <input type="checkbox" name="JS" id="html" value="JS"><label for="html">JavaScript</label>

        <label for="Message">Message</label>
        <textarea name="Message" id="textare" cols="30" rows="10"></textarea>

        <button id="submit" type="submit">Submit</button>

    </form>

</body>
</html>
