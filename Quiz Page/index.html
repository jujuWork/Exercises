<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quiz Page Exercise">
    <title>Quiz Page</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <img src="https://cdn.freecodecamp.org/platform/universal/fcc_primary.svg" id="logo">
            <h1>HTML/CSS QUIZ</h1>
                <nav>
                   <ul>
                    <li><a href="#info">INFO</a></li>
                    <li><a href="#html">HTML</a></li>
                    <li><a href="#css">CSS</a></li>
                   </ul> 
                </nav>
    </header>

    <main>
        <form action="https://freecodecamp.org/practice-project/accessibility-quiz" method="post">

            <section role="region" aria-labelledby="student-info">
                <h2 id="student-info">Student Info</h2>
                    <div class="info">
                        <label for="studentName">Student's Name:</label>
                            <input  type="text" id="studentName">   
                    </div>
                    <div class="info">
                        <label for="emailAddress">Email Address:</label>
                            <input type="email" id="emailAddress">    
                    </div>
                    <div class="info">
                        <label for="dateOfBirth">Date of Birth:</label>
                            <input type="date" id="dateOfBirth">    
                    </div>
            </section>
            <section role="region" aria-labelledby="html-questions">
                <h2 id="html-questions">HTML</h2>
            </section>
            <section role="region" aria-labelledby="css-questions">
                <h2 id="css-questions">CSS</h2>
            </section>
            
        </form>
    </main>
</body>
</html>
