<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Registration Form</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <header>
            <h1 id="title">Family Registration Form</h1>
            <p id="description">Please fill this form to register</p>
            <hr>
        </header>
    
        <form id="survey-form">
            <div class="label-name">
                <label for="name" id="name-label">Name</label>
            </div>
            <div class="input-fields">
                <input type="text" name="first-name" id="name" placeholder="First Name" required autocomplete="off">
                <input type="text" name="last-name" id="lastName" placeholder="Last Name" required autocomplete="off">
            </div>

            <div class="space"></div>

            <div class="label-name">
                <label for="gender" id="gender">Gender</label>
            </div>
            <div class="input-fields-radio">
                <input type="radio" name="gender" id="male" value="male">
                    <label for="male" class="gender-category">Male</label>
            </div>
            <div class="input-fields-radio">
                <input type="radio" name="gender" id="female" value="female">
                    <label for="male" class="gender-category">Female</label>
            </div>

            <div class="space"></div>

            <div class="label-name">
                <label for="address" id="address">Address</label>
            </div>
            <div class="input-fields">
                <input type="text" name="region" id="regionName" placeholder="Region" required autocomplete="off">
                <input type="text" name="state" id="stateName" placeholder="State" required autocomplete="off">
                <input type="text" name="address" id="streetAddress" placeholder="Street Address" class="inputFull" required autocomplete="off">
                <input type="text" name="city" id="city" placeholder="City" required autocomplete="off">              
                <input type="number" name="zipcode" id="zipCode" placeholder="Zip Code" required autocomplete="off">              
            </div>
            
            <div class="space"></div>

            <div class="label-name">
                <label for="phone" id="email-label">Email</label>
            </div>
            <div class="input-fields">
                <input type="email" name="email" id="email" placeholder="Email Address" required autocomplete="off" class="inputFull">
            </div>

            <div class="space"></div>
            
            <div class="label-name">
                <label for="contact" id="number-label">Contact</label>
            </div> 
            <div class="input-fields">
                <input type="number" id="number" min="1" max="9" placeholder="Your contact number" class="inputFull" required autocomplete="off">
            </div>

            <div class="space"></div>

            <div class="label-name">
                <label for="familymember">Family Member</label>
            </div>
            <div class="input-fields">
                <input type="text" id="familyMember" placeholder="Complete Name(Child)" class="inputMedium">
                    <select name="age" id="dropdown">
                        <option class="inputSmall">Age</option>
                    <option class="inputSmall">00~14</option>
                    </select>
                <input type="text" id="familyMember" placeholder="Complete Name(Adolescence)" class="inputMedium">
                    <select name="age" id="dropdown">
                        <option class="inputSmall">Age</option>
                    <option class="inputSmall">14~21</option>
                    </select>
                <input type="text" id="familyMember" placeholder="Complete Name(Mature)" class="inputMedium">
                <select name="age" id="dropdown">
                    <option class="inputSmall">Age</option>
                <option class="inputSmall">21~99</option>
                </select>
            </div>

             <div class="space"></div>

             <div class="textarea">
                <textarea name="textarea" id="textarea" placeholder="Family Motto"></textarea>
             </div>

             <div class="input-fields-checkbox">
                <input type="checkbox" id="checkbox-confirm" value="checkbox for confirmation">
                    <label for="confirmation" class="confirmations">Confirm information</label>
             </div>
             <div class="input-fields-checkbox">
                <input type="checkbox" id="term" value="Terms and Conditions">
                    <label for="confirmation" class="confirmations">Terms and Conditions</label>
             </div>

             <div class="space"></div>
             <div class="space"></div>

        <div class="button">
            <button type="submit" id="submit" onclick="alert('Thank you for registering')">Submit</button>
        </div>

        <div class="space"></div>
        </form>
    </main>
</body>
</html>
