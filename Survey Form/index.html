<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Town Survey Form</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Town Survey Form</h1>
        <h4>Thank you for taking this survey</h4>
    </header>
    
    <form id="survery-form">
        <div class="form-group">
            <label for="name" id="name-label">Name:</label>
            <input 
            type="text" 
            name="name" 
            id="name" 
            class="input-field"
            placeholder="Enter your name"
            autocomplete="off"
            required
            
            />
        </div>
        <div class="form-group">
            <label for="email" id="email-label">Email:</label>
            <input 
            type="email"
            name="email"
            id="email"
            class="input-field"
            placeholder="Enter your email"
            autocomplete="off"
            required
            />
        </div>
        <div class="form-group">
            <label for="number" id="tel-label">Age:(optional)</label>
            <input 
            type="number"
            name="tel"
            id="tel"
            placeholder="Age"
            autocomplete="off"
            />       
        </div>
        <div class="form-group">
            <label for="place" id="place-label">Town Name</label>
            <input 
            type="text"
            id="town-name"
            name="town-name"
            placeholder="Town Name"
            autocomplete="off"
            />
            <select name="Location" id="location">
                <option value="Location">Location</option>
                <option value="North">North</option>
                <option value="East">East</option>
                <option value="West">West</option>
                <option value="South">South</option>
            </select>
        </div>
    </form>
</body>
</html>
