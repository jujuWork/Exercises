                        <h5><span>1861 - 1896</span></h5>
                            <p id="tribute-info">
                                "I do not write for this generation. 
                                I am writing for other ages. 
                                If this could read me, they would burn my books, the work of my whole life.
                                On the other hand, the generation which interprets these writings will be an educated generation; 
                                they will understand me and say: 'Not all were asleep in the nighttime of our grandparents."
                            </p>
