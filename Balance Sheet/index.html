<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Sheet</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section>
            <h1>
                <span class="flex">
                    <span>AcmeWidgetCorp</span>
                    <span>Balance Sheet</span>
                </span>
            </h1>
            <div id="years" aria-hidden="true">
                <span class="year">2019</span>
                <span class="year">2020</span>
                <span class="year">2021</span>
            </div>
            <div class="table-wrap"></div>
                <table>
                    <caption>Assets</caption>
                        <thead>
                          <tr>
                            <td></td>
                                <th>
                                    <span clas="sr-only year">2019</span>
                                </th>
                                <th>
                                    <span clas="sr-only year">2020</span>
                                </th>
                                <th class="current">
                                    <span clas="sr-only year">2021</span>
                                </th>
                          </tr>  
                        </thead>
                        <tbody>
                            <tr class="data">
                                <th>
                                    Cash <span class="description">This is the cash we current have on hand.</span>
                                </th>
                            </tr>
                            <tr class="data">$25</tr>
                            <tr class="data">$30</tr>
                            <tr class="total">$28</tr>
                        </tbody>
                </table>
                <table></table>
                <table></table>
        </section>
    </main>
</body>
</html>
